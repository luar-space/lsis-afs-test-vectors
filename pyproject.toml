[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lsis-afs-test-vectors"
version = "0.4.0"
description = "Staged LSIS-AFS interoperability test-vector package (Levels 1–5). v0.4.0 ships Level 1 spreading codes (210 PRNs), Level 2 encoded frames (5 standard test messages + 2 boundary frames) plus their canonical pre-encode SB2/SB3/SB4 input bytes, Level 3 baseband I/Q signals (10 × 12 s @ 10.23 MHz, gzipped) generated from the matching L2 frames, and Level 4 cross-decode outputs produced by PocketSDR-AFS @ pinned SHA from those signals (10 × 6000 symbols, byte-exact equal to the L2 frame payloads, closing the receive-side loop). Validated against LNIS AD1 Volume A Annex 3, LANS-AFS-SIM (L1+L2 independent), the LSIS V1.0 §2.4 structural rules, a first-chip polarity oracle (L3 structural), and PocketSDR-AFS (L4 cross-decode). Apache-2.0 source for the LANS-AFS-SIM and PocketSDR-AFS verification harnesses ships alongside for end-to-end reproducibility."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
keywords = ["LSIS-AFS", "LunaNet", "PNT", "GNSS", "spreading-codes", "CCSDS", "ESA", "interoperability", "test-vectors"]
authors = [{ name = "Marco Fiscato" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Testing",
]
dependencies = []

[project.scripts]
lsis-afs-validate = "validate:main"

[project.urls]
Repository = "https://github.com/luar-space/lsis-afs-test-vectors"
Issues = "https://github.com/luar-space/lsis-afs-test-vectors/issues"

[tool.hatch.build.targets.wheel]
only-include = [
    "validate.py",
    "codes",
    "frames",
    "inputs",
    "signals",
    "references",
    "manifest.json",
    "README.md",
    "CORRECTNESS.md",
    "CHANGELOG.md",
    "CITATION.cff",
]

[tool.hatch.build.targets.sdist]
only-include = [
    "validate.py",
    "codes",
    "frames",
    "inputs",
    "signals",
    "references",
    "manifest.json",
    "README.md",
    "CORRECTNESS.md",
    "CHANGELOG.md",
    "CITATION.cff",
    "LICENSE",
    "pyproject.toml",
    "tests",
    ".github/workflows/verify.yml",
]

[project.optional-dependencies]
# Optional speedup for `check-signals` (L3 full-range scan): the stdlib path
# uses bytes.count over a 982 MB payload (~3 s per file). With numpy installed,
# the same check runs as a vectorised uint32 mask (~0.3 s per file).
fast = ["numpy>=1.20"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
    # CI gets the fast path; end-users opt in via `pip install ...[fast]`.
    "numpy>=1.20",
]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
    "E", "F", "W",     # pycodestyle + pyflakes
    "I",               # isort
    "N",               # pep8-naming
    "UP",              # pyupgrade
    "B",               # flake8-bugbear
    "SIM",             # flake8-simplify
    "PL",              # pylint
    "RUF",             # ruff-specific
]
ignore = [
    "PLR2004",         # magic numbers are fine in a validator of fixed-length formats
    "PLR0913",         # "too many arguments" — argparse callbacks set by design
    "RUF001",          # `×` in user-facing strings is intentional (math notation)
    "RUF002",          # `×` in docstrings is intentional (math notation)
    "RUF003",          # `×` in comments is intentional (math notation)
]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra --strict-markers"
