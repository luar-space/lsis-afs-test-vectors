name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync project
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Tests
        run: uv run pytest

      - name: check-annex3 (L1 normative oracle)
        run: uv run lsis-afs-validate check-annex3

      - name: check-lans-afs-sim (L1 second oracle)
        run: uv run lsis-afs-validate check-lans-afs-sim

      - name: check-frames (L2 structural oracle)
        run: uv run lsis-afs-validate check-frames

      - name: check-lans-afs-sim-frames (L2 second oracle)
        run: uv run lsis-afs-validate check-lans-afs-sim-frames

      - name: check-canonical-inputs (L2 pre-encode reproducibility)
        run: uv run lsis-afs-validate check-canonical-inputs

      - name: check-signals (L3 structural + first-chip polarity oracle)
        run: uv run lsis-afs-validate check-signals

      - name: check-decode (L4 cross-decode round-trip)
        run: uv run lsis-afs-validate check-decode

      - name: verify-manifest
        run: uv run lsis-afs-validate verify-manifest
